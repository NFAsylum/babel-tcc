name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/ide-adapters/vscode/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Verify tag matches Directory.Build.props version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' Directory.Build.props)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Directory.Build.props ($CSPROJ_VERSION)"
            exit 1
          fi

  core-test:
    name: Core Tests
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  vscode-test:
    name: Extension Tests
    needs: validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/ide-adapters/vscode

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  package-and-release:
    name: Package & Release
    needs: [core-test, vscode-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install extension dependencies
        working-directory: packages/ide-adapters/vscode
        run: npm ci

      - name: Publish Core
        working-directory: packages/ide-adapters/vscode
        run: npm run publish-core

      - name: Copy translations
        working-directory: packages/ide-adapters/vscode
        run: npm run copy-translations

      - name: Build extension
        working-directory: packages/ide-adapters/vscode
        run: npm run build

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: packages/ide-adapters/vscode
        run: vsce package --out babel-tcc-${{ github.ref_name }}.vsix

      - name: Publish to Marketplace
        working-directory: packages/ide-adapters/vscode
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/ide-adapters/vscode/babel-tcc-${{ github.ref_name }}.vsix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
