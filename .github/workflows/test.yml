name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  core-tests:
    runs-on: ubuntu-latest
    name: Core .NET Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

  vscode-build:
    runs-on: ubuntu-latest
    name: VS Code Extension Build

    defaults:
      run:
        working-directory: packages/ide-adapters/vscode

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: packages/ide-adapters/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
